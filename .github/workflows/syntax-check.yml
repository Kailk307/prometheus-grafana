name: Docker Compose Syntax Checker

# 1. Định nghĩa SỰ KIỆN: Kích hoạt pipeline này mỗi khi có người PUSH code lên nhánh 'main'
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. Định nghĩa các HÀNH ĐỘNG (Jobs) sẽ chạy
jobs:
  validate-config:
    # Mượn một máy ảo Ubuntu sạch của GitHub để chạy test
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Tải code từ Repo GitHub về máy ảo này
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Kiểm tra xem Docker và Docker Compose có sẵn trên máy ảo không
      - name: Verify Docker Compose Installation
        run: docker-compose --version

      # Bước 3: Lệnh CHỐT HẠ - Kiểm tra cú pháp file docker-compose.yml
      # Tham số --quiet giúp lệnh chỉ báo lỗi nếu có, không in ra cả file cấu hình dài dòng
      - name: Run Docker Compose Syntax Check
        run: |
          docker-compose config --quiet
